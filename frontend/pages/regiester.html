<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/css/output.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
      integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <title>Sign-Up</title>
  </head>
  <body
    class="flex bg-linear-to-r from-sky-50 via-sky-100 to-sky-200 items-center justify-center w-full min-h-screen py-8 overflow-hidden"
  >
    <div
      class="w-[40%] rounded-4xl bg-white/20 backdrop-blur-md border-b border-white/30 shadow-2xl flex flex-col gap-5 my-5 p-5"
      data-aos="fade-down"
      data-aos-easing="linear"
      data-aos-duration="2000"
    >
      <h1
        class="font-bold text-xl md:text-3xl bg-linear-to-b from-sky-950 via-sky-600 to-sky-400 bg-clip-text text-transparent text-center"
      >
        Create an account
      </h1>

      <form action="" class="w-full flex flex-col gap-3">
        <!-- Full Name -->
        <div class="w-full flex flex-col gap-2 p-2">
          <label
            for="fullname"
            class="text-sm md:text-lg bg-linear-to-b font-semibold from-sky-700 via-sky-600 to-sky-400 bg-clip-text text-transparent"
            >Full name.</label
          >
          <input
            type="text"
            id="fullname"
            name="fullname"
            placeholder="sayed mohamed"
            class="outline-0 border-b-2 transition-all duration-500 ease-linear border-transparent focus:border-sky-600 placeholder:text-sky-700 text-sky-800 p-2.5 w-[90%] bg-transparent"
          />
        </div>

        <!-- Email -->
        <div class="w-full flex flex-col gap-2 p-2">
          <label
            for="email"
            class="text-sm md:text-lg bg-linear-to-b font-semibold from-sky-700 via-sky-600 to-sky-400 bg-clip-text text-transparent"
            >Enter your email.</label
          >
          <input
            type="email"
            id="email"
            name="email"
            placeholder="sayed@gmail.com"
            class="outline-0 border-b-2 transition-all duration-500 ease-linear border-transparent focus:border-sky-600 placeholder:text-sky-700 text-sky-800 p-2.5 w-[90%] bg-transparent"
          />
        </div>

        <!-- Academic ID -->
        <div class="w-full flex flex-col gap-2 p-2">
          <label
            for="academic-id"
            class="text-sm md:text-lg bg-linear-to-b font-semibold from-sky-700 via-sky-600 to-sky-400 bg-clip-text text-transparent"
            >Enter your academic ID.</label
          >
          <input
            type="text"
            id="academic-id"
            name="academic-id"
            placeholder="e.g. 20210001"
            class="outline-0 border-b-2 transition-all duration-500 ease-linear border-transparent focus:border-sky-600 placeholder:text-sky-700 text-sky-800 p-2.5 w-[90%] bg-transparent"
          />
        </div>

        <!-- Password -->
        <div class="w-full flex flex-col gap-2 p-2">
          <label
            for="password"
            class="text-sm md:text-lg bg-linear-to-b font-semibold from-sky-700 via-sky-600 to-sky-400 bg-clip-text text-transparent"
            >Enter your password.</label
          >
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter here"
            class="outline-0 border-b-2 transition-all duration-500 ease-linear border-transparent focus:border-sky-600 placeholder:text-sky-700 text-sky-800 p-2.5 w-[90%] bg-transparent"
          />
        </div>

        <!-- Confirm Password -->
        <div class="w-full flex flex-col gap-2 p-2">
          <label
            for="confirm-password"
            class="text-sm md:text-lg bg-linear-to-b font-semibold from-sky-700 via-sky-600 to-sky-400 bg-clip-text text-transparent"
            >Confirm your password.</label
          >
          <input
            type="password"
            id="confirm-password"
            name="confirm-password"
            placeholder="Repeat password"
            class="outline-0 border-b-2 transition-all duration-500 ease-linear border-transparent focus:border-sky-600 placeholder:text-sky-700 text-sky-800 p-2.5 w-[90%] bg-transparent"
          />
        </div>

        <!-- Checkbox + Login link -->

        <div
          class="w-full flex justify-between p-4 items-center text-center"
        >
          <div class="flex flex-col md:flex-row items-center justify-center p-2">
            <input
              type="checkbox"
              class="checkbox checkbox-accent"
              id="checkboxAccent"
              checked
            />
            <label
              class="label-text bg-linear-to-b font-semibold hover:bg-linear-to-l from-sky-700 via-sky-600 to-sky-400 bg-clip-text text-transparent text-sm md:text-lg"
              for="checkboxAccent"
            >
              Agree to our terms
            </label>
          </div>
          <a
            href="./regiester.html"
            class="bg-linear-to-b font-semibold hover:bg-linear-to-l from-sky-700 via-sky-600 to-sky-400 bg-clip-text text-transparent text-sm md:text-lg underline underline-offset-4 decoration-2 decoration-transparent hover:decoration-sky-700 transition-all duration-700 ease-linear text-center"
          >
            already have an account??
          </a>
        </div>
        <button
          class="btn btn-gradient btn-accent w-full flex items-center justify-center text-center mt-5 md:mt-10"
        >
          Sign Up
        </button>
      </form>
    </div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
  </body>
</html>
